name: flutter_debug_tools
description: FlutterLens is a set of tools to help find and debug UI or performance issues from the Flutter app itself.
version: 2.0.4
repository: https://github.com/LiquidatorCoder/flutter_debug_tools
topics: [debug, color-picker, performance, ui, size]

environment:
  sdk: ^3.5.4
  flutter: ">=3.35.0"

dependencies:
  device_info_plus: ^12.3.0
  flutter:
    sdk: flutter
  package_info_plus: ^9.0.0
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

screenshots:
  - description: FlutterLens
    path: screenshots/image.png

flutter:
  assets:
    - assets/images/icon.png
  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Variable.ttf
          weight: 100
        - asset: assets/fonts/DMSans-Variable.ttf
          weight: 200
        - asset: assets/fonts/DMSans-Variable.ttf
          weight: 300
        - asset: assets/fonts/DMSans-Variable.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Variable.ttf
          weight: 500
        - asset: assets/fonts/DMSans-Variable.ttf
          weight: 600
        - asset: assets/fonts/DMSans-Variable.ttf
          weight: 700
        - asset: assets/fonts/DMSans-Variable.ttf
          weight: 800
        - asset: assets/fonts/DMSans-Variable.ttf
          weight: 900
